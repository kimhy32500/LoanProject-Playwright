<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루피뱅크 - 결과</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container" id="main_container">
        <h2>🏦 심사 결과</h2>
        
        <div id="success_view" style="display:none;">
            <p style="text-align:center; color: #1e8e3e; font-weight: bold;">🎉 고객님께 최적화된 상품입니다.</p>
            <div class="product-card" onclick="showDetail('1금융권 직장인 대출', '금리 연 3.2% / 한도 최대 1.5억')">
                <h3>🏆 우량 직장인 대출</h3>
                <p>최저 연 3.2%</p>
            </div>
            <div class="product-card" onclick="showDetail('햇살론 서민지원', '금리 연 7.0% / 한도 최대 3천만')">
                <h3>☀️ 햇살론 (정부지원)</h3>
                <p>서민금융진흥원 보증</p>
            </div>
            <button class="btn btn-outline" onclick="goHome()">홈으로 이동</button>
        </div>

        <div id="fail_view" style="display:none; text-align:center;">
            <div style="font-size: 50px; margin-bottom: 20px;">😥</div>
            <p>죄송합니다. 현재 기준으로는<br>가입 가능한 상품이 없습니다.</p>
            <!-- [🟡 버그 7 수정] retryLoan() 함수 연결 (기존: location.href='input.html' 직접 호출) -->
            <button class="btn" onclick="retryLoan()">정보 수정하여 재심사</button>
            <button class="btn btn-outline" onclick="goHome()">홈으로 이동</button>
        </div>

        <div id="detail_view" style="display:none;">
            <h3 id="det_title" style="color:#1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px;"></h3>
            <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin:20px 0; line-height: 1.6;">
                <p id="det_desc"></p>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">* 본 상품은 루피뱅크 심사 기준에 따라 한도가 달라질 수 있습니다.</p>
            </div>
            <button class="btn" onclick="alert('신청이 완료되었습니다. 담당자가 곧 연락드립니다.')">지금 신청하기</button>
            <button class="btn btn-outline" onclick="goBackToList()">목록으로 돌아가기</button>
            <button class="btn btn-outline" onclick="goHome()" style="border-color: #ccc; color: #666;">홈으로</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const user   = params.get('user');
        const income = parseInt(params.get('income'));

        // [🔴 버그 3 수정] alert 제거, 즉시 리다이렉트로 페이지 노출 방지
        if (!user) {
            location.href = "login.html";
        }

        // [🔴 버그 1] 단위 일치 확인: input이 '만원' 단위 → 3000 >= 3000 통과
        if (income >= 3000) {
            document.getElementById('success_view').style.display = 'block';
        } else {
            document.getElementById('fail_view').style.display = 'block';
        }

        // 3. 상품 상세 보기
        function showDetail(title, desc) {
            document.getElementById('success_view').style.display = 'none';
            document.getElementById('detail_view').style.display  = 'block';
            document.getElementById('det_title').innerText = title;
            document.getElementById('det_desc').innerText  = desc;
        }

        // 4. 상품 목록으로 복귀
        function goBackToList() {
            document.getElementById('detail_view').style.display  = 'none';
            document.getElementById('success_view').style.display = 'block';
        }

        // [🟡 버그 7 수정] 재심사 시 user 파라미터 유지하여 input으로 이동
        function retryLoan() {
            location.href = "input.html?user=" + user;
        }

        // [🔴 버그 2 수정] 홈 복귀 시 고정값(admin) 아닌 실제 user 전달
        function goHome() {
            location.href = "index.html?user=" + user;
        }
    </script>
</body>
</html>
